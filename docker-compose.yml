x-loki-logging: &loki-logging
  logging:
    driver: loki
    options:
      loki-url: "http://localhost:3100/loki/api/v1/push"
      loki-pipeline-stages: |
        - json:
            expressions:
              level: level
              service: service
        - labels:
            level:
            service:

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    <<: *loki-logging
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      APP_PORT: "8080"
      JWT_SECRET: "change-me-in-production"
      REDIS_URL: "redis:6379"
      AUTH_SERVICE_URL: "http://auth:8081"
      AUCTION_SERVICE_URL: "http://auction:8082"
      BID_SERVICE_URL: "http://bid:8083"
      PAYMENT_SERVICE_URL: "http://payment:8084"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
    healthcheck:
      test: ["CMD", "/gateway", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      auth:
        condition: service_healthy
      auction:
        condition: service_healthy
      bid:
        condition: service_healthy
      payment:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    <<: *loki-logging
    restart: unless-stopped
    environment:
      APP_PORT: "8081"
      JWT_SECRET: "change-me-in-production"
      JWT_ACCESS_EXPIRY: "1h"
      JWT_REFRESH_EXPIRY: "168h"
      PG_HOST: auth-db
      PG_PORT: "5432"
      PG_DATABASE: auth_db
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      REDIS_URL: "redis:6379"
      MIGRATION_PATH: /migrations
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
    healthcheck:
      test: ["CMD", "/auth", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_healthy

  auction:
    build:
      context: .
      dockerfile: Dockerfile.auction
    <<: *loki-logging
    restart: unless-stopped
    environment:
      APP_PORT: "8082"
      PG_HOST: auction-db
      PG_PORT: "5432"
      PG_DATABASE: auction_db
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      NATS_URL: "nats://nats:4222"
      MIGRATION_PATH: /migrations
      GRPC_PORT: "9090"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
    healthcheck:
      test: ["CMD", "/auction", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      auction-db:
        condition: service_healthy
      nats:
        condition: service_healthy
      tempo:
        condition: service_healthy

  bid:
    build:
      context: .
      dockerfile: Dockerfile.bid
    <<: *loki-logging
    restart: unless-stopped
    environment:
      APP_PORT: "8083"
      PG_HOST: bid-db
      PG_PORT: "5432"
      PG_DATABASE: bid_db
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      NATS_URL: "nats://nats:4222"
      AUCTION_SERVICE_URL: "http://auction:8082"
      AUCTION_GRPC_ADDRESS: "auction:9090"
      MIGRATION_PATH: /migrations
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
    healthcheck:
      test: ["CMD", "/bid", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      bid-db:
        condition: service_healthy
      nats:
        condition: service_healthy
      auction:
        condition: service_healthy
      tempo:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: Dockerfile.payment
    <<: *loki-logging
    restart: unless-stopped
    environment:
      APP_PORT: "8084"
      PG_HOST: payment-db
      PG_PORT: "5432"
      PG_DATABASE: payment_db
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      NATS_URL: "nats://nats:4222"
      MIGRATION_PATH: /migrations
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
    healthcheck:
      test: ["CMD", "/payment", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      payment-db:
        condition: service_healthy
      nats:
        condition: service_healthy
      tempo:
        condition: service_healthy

  auth-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auction-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auction_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auction-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bid-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bid_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - bid-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "-m", "8222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml
      - tempo-data:/var/tempo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.4.0
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.0
    command: -config.file=/etc/loki/loki.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.0.1
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  auth-data:
  auction-data:
  bid-data:
  payment-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
