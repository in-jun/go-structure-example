services:
  app:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      APP_PORT: "8080"
      JWT_SECRET: "change-me-in-production"
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "168h"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: app_db
      MYSQL_USERNAME: app
      MYSQL_PASSWORD: app
      MYSQL_MAX_OPEN_CONNS: "25"
      MYSQL_MAX_IDLE_CONNS: "10"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CORS_ALLOW_ORIGINS: "*"
      SHUTDOWN_TIMEOUT: "10s"
      REQUEST_TIMEOUT: "30s"
      RATE_LIMIT_BURST: "100"
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
