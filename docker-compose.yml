services:
  app:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      APP_PORT: "8080"
      JWT_SECRET: "change-me-in-production"
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "168h"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: app_db
      PG_USERNAME: app
      PG_PASSWORD: app
      PG_MAX_OPEN_CONNS: "25"
      PG_MAX_IDLE_CONNS: "10"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CORS_ALLOW_ORIGINS: "*"
      SHUTDOWN_TIMEOUT: "10s"
      REQUEST_TIMEOUT: "30s"
      RATE_LIMIT_BURST: "100"
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
