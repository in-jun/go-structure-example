version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - noctx
    - gosec
    - errname
    - errorlint
  exclusions:
    rules:
      - linters:
          - errcheck
          - gosec
          - noctx
        path: "_test\\.go"
    paths:
      - vendor
      - proto
