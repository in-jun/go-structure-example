version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - noctx
    - gosec
    - errname
    - errorlint
  settings:
    gosec:
      excludes:
        # G108: pprof registered on DefaultServeMux — all cmd/* bind it to "localhost:" only
        - G108
        # G404: math/rand used for retry jitter and mock payment; not a security context
        - G404
        # G117/G710: URL built from trusted env vars (service URLs from config); not user-supplied
        - G117
        - G710
        # G704: healthcheck URL is always "http://localhost:APP_PORT/health/ready";
        #       APP_PORT is set by docker-compose config, not user input — SSRF flag is a false positive
        - G704
  exclusions:
    rules:
      - linters:
          - errcheck
          - gosec
          - noctx
        path: "_test\\.go"
    paths:
      - vendor
      - proto
